{% extends "base.html" %}
{% load static %}
{% block content %}
    <div class="hr-main">
        <div class="hr-left">
            <h3>Profile Details</h3>
            <p>Name : {{request.user.username}}</p>
            <p>Email : {{request.user.email}}</p>
            <p>Department : {{request.user_profile.user_department.department.department}} </p>
        </div>
        <div class="hr-right">
            <h3>Ask AI</h3>
            <a href="{% url 'ask' %}">Go to Chatbot</a>
        </div>
    </div>
{% endblock %}
