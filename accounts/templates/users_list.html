{% extends "base.html" %}
{% block content %}

<h2>All Users</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Department</th>
        <th>Gender</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.user.username }}</td>
        <td>{{ user.user.email }}</td>
        <td>{{ user.userdepartment.department }}</td>
        <td>{{ user.gender }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
