{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="upload-container">
    <h2>Upload Policy Document</h2>
    <form method="POST" enctype="multipart/form-data" class="upload-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>
</div>
{% endblock %}
